services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data

  cobalt-api:
    image: ghcr.io/imputnet/cobalt:11
    restart: unless-stopped
    environment:
      - API_URL=http://cobalt-api:9000
      - API_PORT=9000
      - CORS_WILDCARD=1
      - PROCESSING_PRIORITY=10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - COBALT_API_URL=http://cobalt-api:9000
      - VIDEO_INFO_CACHE_TTL=600
      - DOWNLOADS_MAX_GB=10
    depends_on:
      - redis
      - cobalt-api
    volumes:
      - downloads:/app/downloads

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info --concurrency=8 --max-tasks-per-child=50
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - COBALT_API_URL=http://cobalt-api:9000
      - DOWNLOADS_MAX_GB=10
    depends_on:
      - redis
      - backend
    volumes:
      - downloads:/app/downloads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

volumes:
  redis-data:
  downloads:
