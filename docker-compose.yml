services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data

  # PO Token provider — generates YouTube Proof-of-Origin tokens
  # Required since May 2025: YouTube blocks ALL yt-dlp player clients
  # without a valid PO token (LOGIN_REQUIRED / bot detection).
  # Two instances for redundancy — tokens are cached in Redis so Chrome
  # is almost never called during real requests (only pre-warm every 3h).
  bgutil-pot:
    image: ghcr.io/jim60105/bgutil-pot:latest
    pull_policy: always
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4416/ || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 120s

  bgutil-pot-2:
    image: ghcr.io/jim60105/bgutil-pot:latest
    pull_policy: always
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4416/ || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 120s

  cobalt-api:
    image: ghcr.io/imputnet/cobalt:latest
    restart: unless-stopped
    environment:
      - API_URL=http://cobalt-api:9000
      - API_PORT=9000
      - CORS_WILDCARD=1
      - PROCESSING_PRIORITY=10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - COBALT_API_URL=http://cobalt-api:9000
      - BGUTIL_POT_URL=http://bgutil-pot:4416,http://bgutil-pot-2:4416
      - VIDEO_INFO_CACHE_TTL=600
      - DOWNLOADS_MAX_GB=10
      - DAILY_QUOTA_PER_IP=50
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ENV=${ENV:-production}
      - YOUTUBE_COOKIES_B64=${YOUTUBE_COOKIES_B64}
      - TIKTOK_COOKIES_B64=${TIKTOK_COOKIES_B64}
      - FACEBOOK_COOKIES_B64=${FACEBOOK_COOKIES_B64}
    depends_on:
      - redis
      - cobalt-api
      - bgutil-pot
      - bgutil-pot-2
    volumes:
      - downloads:/app/downloads
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info --concurrency=8 --max-tasks-per-child=50
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - COBALT_API_URL=http://cobalt-api:9000
      - BGUTIL_POT_URL=http://bgutil-pot:4416,http://bgutil-pot-2:4416
      - DOWNLOADS_MAX_GB=10
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    depends_on:
      - redis
      - backend
      - bgutil-pot
      - bgutil-pot-2
    volumes:
      - downloads:/app/downloads

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DOWNLOADS_MAX_GB=10
    depends_on:
      - redis
      - celery
    volumes:
      - downloads:/app/downloads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    expose:
      - "80"
    depends_on:
      - backend

volumes:
  redis-data:
  downloads:
