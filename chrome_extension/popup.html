<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Downloader Extension</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="w-80 bg-gray-900 text-white font-sans p-5">
  <div class="flex items-center space-x-3 mb-5 border-b border-gray-700 pb-3">
    <div class="w-10 h-10 bg-red-500 rounded-xl flex items-center justify-center shadow-lg">
      <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
    </div>
    <div>
      <h1 class="text-lg font-bold leading-tight">Pro Downloader</h1>
      <p class="text-xs text-gray-400">No Watermark & HD</p>
    </div>
  </div>

  <!-- Settings / API Key -->
  <div class="mb-4">
    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">API Authentication</label>
    <div class="flex gap-2">
      <input type="password" id="apiKey" class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-500 transition-colors" placeholder="Enter your API Key">
      <button id="saveKeyBtn" class="bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded-lg text-sm font-medium transition-colors">Save</button>
    </div>
  </div>

  <!-- Download Options -->
  <div class="mb-5 bg-gray-800 p-4 rounded-xl border border-gray-700">
    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Download Options</label>
    
    <div class="mb-3">
      <label class="block text-sm mb-1">Quality / Format</label>
      <select id="qualitySelect" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-500">
        <option value="video">MP4 (Best Quality / 1080p)</option>
        <option value="video_1080">MP4 (1080p FHD)</option>
        <option value="video_720">MP4 (720p HD)</option>
        <option value="mp3_320">MP3 (Audio 320kbps)</option>
        <option value="mp3_128">MP3 (Audio 128kbps)</option>
      </select>
    </div>

    <label class="flex items-center space-x-3 text-sm cursor-pointer group">
      <div class="relative flex items-center">
        <input type="checkbox" id="removeWatermark" class="peer sr-only" checked>
        <div class="w-10 h-6 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-red-500"></div>
      </div>
      <span class="group-hover:text-red-400 transition-colors">Remove Watermark</span>
    </label>
  </div>

  <button id="downloadBtn" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition duration-200 flex justify-center items-center gap-2">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
    Extract Media
  </button>

  <!-- Progress / Countdown UI -->
  <div id="progressContainer" class="hidden mt-5">
    <div class="flex justify-between text-xs mb-2">
      <span id="statusText" class="text-red-400 font-medium">Processing...</span>
      <span id="countdownTimer" class="text-gray-400 hidden">Expires in <span id="timeRemaining">15:00</span></span>
    </div>
    <div class="w-full bg-gray-700 rounded-full h-2.5 overflow-hidden">
      <div id="progressBar" class="bg-red-500 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
    </div>
  </div>
  
  <div id="resultContainer" class="hidden mt-4 p-4 bg-green-900/30 border border-green-800 rounded-xl text-center">
    <a id="downloadLink" href="#" target="_blank" class="text-green-400 text-sm font-bold flex items-center justify-center hover:text-green-300">
      <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
      Save File Now
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
