server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ─────────────────────────────────────────
    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # XSS protection (legacy browsers)
    add_header X-XSS-Protection "1; mode=block" always;
    # Referrer policy - don't leak URLs to external sites
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Permissions policy - restrict browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # Prevent caching of sensitive responses
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
    # Strict Transport Security (HTTPS only)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Block Common Bots & Crawlers ─────────────────────────────
    if ($http_user_agent ~* (Scrapy|curl|HttpClient|python-requests|wget|Postman|bot|crawl|spider|slurp|HTTrack|cloner|copier|mirror|harvest|extract|grab|sucker|teleport)) {
        return 403;
    }

    # ── Block empty User-Agent ───────────────────────────────────
    if ($http_user_agent = "") {
        return 403;
    }

    # ── Block direct IP access (optional) ────────────────────────
    # if ($host !~* ^(dowload-video|vidgrab)) {
    #     return 444;
    # }

    # ── Rate Limit Zones (defined in http block via include) ─────
    # These are applied per-location below

    # ── Static Files (Frontend SPA) ──────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }
    }

    # ── API Proxy ────────────────────────────────────────────────
    location /api/ {
        # Rate limit: 30 requests per second per IP
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Hide backend server info
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;

        # Max upload size
        client_max_body_size 10m;
    }

    # ── Block access to sensitive files ──────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* \.(env|git|sql|bak|log|sh|yml|yaml|toml|ini|cfg|conf)$ {
        deny all;
        return 404;
    }

    # ── Block source maps in production ──────────────────────────
    location ~* \.map$ {
        deny all;
        return 404;
    }

    # ── Custom error pages ───────────────────────────────────────
    error_page 429 /429.html;
    location = /429.html {
        internal;
        default_type text/html;
        return 429 '<!DOCTYPE html><html><body style="background:#012622;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;text-align:center"><div><h1 style="color:#FBBF24;font-size:48px">⚠️ 429</h1><p>Bạn đã gửi quá nhiều yêu cầu. Vui lòng thử lại sau 1 phút.</p></div></body></html>';
    }

    error_page 403 /403.html;
    location = /403.html {
        internal;
        default_type text/html;
        return 403 '<!DOCTYPE html><html><body style="background:#012622;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;text-align:center"><div><h1 style="color:#FF6B6B;font-size:48px">🚫 403</h1><p>Truy cập bị từ chối.</p></div></body></html>';
    }

    # Hide nginx version
    server_tokens off;
}
