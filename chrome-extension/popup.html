<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>VidGrab</title>
  <link rel="stylesheet" href="tailwind.css">
  <style>
    body { width: 340px; font-family: 'Segoe UI', system-ui, sans-serif; }
    .spinner {
      border: 3px solid rgba(255,255,255,0.25);
      border-radius: 50%;
      border-top: 3px solid #fff;
      width: 15px; height: 15px;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tab-btn { transition: all 0.2s; }
    .tab-btn.active {
      background: linear-gradient(135deg, #f97316, #eab308);
      color: #1a1a1a;
    }

    #channel-section { display: none; }
    #channel-section.visible { display: block; }

    .progress-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, #f97316, #eab308);
      border-radius: 999px;
      transition: width 0.4s ease;
    }
  </style>
</head>
<body class="bg-gray-900 text-white p-4">

  <!-- Reload banner (ẩn mặc định) -->
  <div id="reload-banner" class="hidden mb-3 bg-yellow-900/40 border border-yellow-700 rounded-xl p-3 text-center">
    <div class="text-yellow-400 text-xs font-bold mb-2">⚡ VidGrab chưa được kích hoạt trên trang này</div>
    <button id="reload-btn" class="w-full bg-yellow-500 hover:bg-yellow-400 text-gray-900 font-bold py-2 rounded-lg text-xs transition-all">
      🔄 Reload trang để kích hoạt
    </button>
  </div>

  <!-- Header -->
  <div class="flex items-center gap-2 mb-3 pb-3 border-b border-gray-700">
    <div class="bg-gradient-to-br from-orange-500 to-yellow-400 text-gray-900 font-extrabold px-2 py-0.5 rounded-lg text-sm">VG</div>
    <h1 class="text-base font-bold text-orange-400 flex-1">VidGrab</h1>
    <div id="page-badge" class="text-xs px-2 py-0.5 rounded-full bg-gray-800 text-gray-400 border border-gray-700">
      Đang nhận diện...
    </div>
  </div>

  <!-- Tab switcher -->
  <div class="flex gap-1 mb-3 bg-gray-800 p-1 rounded-lg">
    <button id="tab-single" class="tab-btn active flex-1 rounded-md py-1.5 text-xs font-bold text-gray-900">
      Video đơn
    </button>
    <button id="tab-channel" class="tab-btn flex-1 rounded-md py-1.5 text-xs font-bold text-gray-400 hover:text-white">
      Playlist / Kênh
    </button>
  </div>

  <!-- ── SINGLE VIDEO SECTION ── -->
  <div id="single-section">
    <div class="mb-3">
      <label class="block text-xs text-gray-400 mb-1">Chất lượng tải</label>
      <select id="qualitySelect" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-orange-500">
        <option value="video">MP4 (Video HD)</option>
        <option value="video_4k">MP4 (4K / Tốt nhất)</option>
        <option value="mp3_320">MP3 (Âm thanh 320kbps)</option>
      </select>
    </div>

    <div class="mb-3 flex items-center gap-2">
      <input type="checkbox" id="removeWatermark" checked class="w-4 h-4 accent-orange-500 bg-gray-800 border-gray-600 rounded">
      <label for="removeWatermark" class="text-sm">Xoá Logo / Watermark</label>
    </div>

    <button id="downloadBtn" class="w-full bg-gradient-to-r from-orange-500 to-yellow-400 hover:from-orange-600 hover:to-yellow-500 text-gray-900 font-bold py-2.5 px-4 rounded-lg flex items-center justify-center gap-2 transition-all">
      <svg id="icon-download" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      <div id="spinner" class="spinner"></div>
      <span id="btnText">Tải Video Ngay</span>
    </button>

    <div id="statusMsg" class="mt-2 text-xs text-center text-gray-500 min-h-[18px]">
      Hệ thống server sẽ xử lý và xoá logo tự động.
    </div>
  </div>

  <!-- ── CHANNEL SECTION (Douyin) ── -->
  <div id="channel-section">
    <div class="bg-gray-800 rounded-xl p-3 mb-3 border border-gray-700">
      <div class="text-xs text-gray-400 mb-1">Kênh đang mở</div>
      <div id="ch-url" class="text-xs text-orange-400 font-mono truncate">—</div>
    </div>

    <div class="bg-gray-800 rounded-xl p-3 mb-3 border border-gray-700">
      <div class="flex justify-between items-center mb-2">
        <span class="text-xs text-gray-400">Video thu thập được</span>
        <span id="ch-count" class="text-2xl font-extrabold text-orange-400">0</span>
      </div>
      <div id="ch-progress-wrap" class="hidden">
        <div class="h-1.5 bg-gray-700 rounded-full overflow-hidden mb-1">
          <div id="ch-progress-bar" class="progress-bar-inner" style="width: 0%"></div>
        </div>
        <div id="ch-scroll-info" class="text-xs text-gray-500 text-right"></div>
      </div>
    </div>

    <div id="ch-status" class="text-xs text-gray-400 mb-3 text-center min-h-[16px]">
      Panel VidGrab đã được mở trên trang kênh.
    </div>

    <button id="ch-scrape-btn" class="w-full bg-gradient-to-r from-orange-500 to-yellow-400 hover:from-orange-600 hover:to-yellow-500 text-gray-900 font-bold py-2.5 px-4 rounded-lg flex items-center justify-center gap-2 transition-all mb-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <div id="ch-spinner" class="spinner"></div>
      <span id="ch-btn-text">Bắt đầu Quét Kênh</span>
    </button>

    <button id="ch-send-btn" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-2.5 px-4 rounded-lg flex items-center justify-center gap-2 transition-all hidden">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
      <span id="ch-send-text">Gửi tải xuống server</span>
    </button>

    <div id="ch-batch-info" class="text-xs text-center text-gray-500 mt-2 hidden"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
