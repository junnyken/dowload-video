<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>VidGrab Downloader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { width: 320px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    /* Nút loading spinner */
    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 3px solid #fff;
      width: 16px;
      height: 16px;
      animation: spin 1s linear infinite;
      display: none;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-900 text-white p-4">
  <div class="flex items-center gap-2 mb-4 pb-2 border-b border-gray-700">
    <div class="bg-orange-500 text-black font-bold p-1 rounded">VG</div>
    <h1 class="text-lg font-bold text-orange-400">VidGrab</h1>
  </div>

  <div class="mb-4">
    <label class="block text-xs text-gray-400 mb-1">Chất lượng tải</label>
    <select id="qualitySelect" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-orange-500">
      <option value="video">MP4 (Video)</option>
      <option value="video_4k">MP4 (4K / Tốt nhất)</option>
      <option value="mp3_320">MP3 (Âm thanh 320kbps)</option>
    </select>
  </div>

  <div class="mb-4 flex items-center gap-2">
    <input type="checkbox" id="removeWatermark" checked class="w-4 h-4 text-orange-500 bg-gray-800 border-gray-600 rounded">
    <label for="removeWatermark" class="text-sm">Xoá Logo / Watermark</label>
  </div>

  <button id="downloadBtn" class="w-full bg-gradient-to-r from-orange-500 to-yellow-500 hover:from-orange-600 hover:to-yellow-600 text-gray-900 font-bold py-2 px-4 rounded-lg flex items-center justify-center gap-2 transition-all">
    <svg id="icon-download" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
    <div id="spinner" class="spinner"></div>
    <span id="btnText">Tải Video Ngay</span>
  </button>

  <div id="statusMsg" class="mt-3 text-xs text-center text-gray-400">
    Hệ thống server sẽ xử lý vượt rào và xoá logo tự động.
  </div>

  <script src="popup.js"></script>
</body>
</html>
